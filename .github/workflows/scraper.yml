name: GSNG Automated Scraper

on:
  schedule:
    - cron:  '*/30 0-2,12-23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install --with-deps chromium

      - name: Run Scraper
        run: python disposcraper.py

      - name: Commit and Push Changes
        run: |
          git config user.name "Menu-Scraper-Bot"
          git config user.email "actions@github.com"
          git add products.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated GSNG menu update 🌿" && git push)